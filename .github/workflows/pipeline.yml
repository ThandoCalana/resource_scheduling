name: Run Python Pipeline

on:
  schedule:
    - cron: '*/9 * * * *' #https://crontab.guru/ 
  workflow_dispatch:

env:
    FILE_NAME: 'Three_Month_Team_Schedule.xlsx'

jobs:
    pipeline:
        runs-on: ubuntu-latest
        steps:
            - name: Set current_timestamp
              run: echo "NOW=$(date +'%Y-%m-%d Z%H:%M:%S')" >> $GITHUB_ENV

            - name: Checkout repo
              uses: actions/checkout@v6 # Allows the GitHub runner access to the repo content
                  with:
                    path: './Schedule/'
                  
            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                python-version: '3.11.0'

            - name: Setup dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
            
            - name: Extract Outlook data
              env:
                CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
                CLICKUP_SPACE_IDS: ${{ secrets.CLICKUP_SPACE_IDS }}
                CLICKUP_ASSIGNEES: ${{ secrets.CLICKUP_ASSIGNEES }}
                OUTLOOK_USER_EMAIL: ${{ secrets.OUTLOOK_USER_EMAIL }}
                TENANT_ID: ${{ secrets.TENANT_ID }}
                CLIENT_ID: ${{ secrets.CLIENT_ID }}
                CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

              run: python current_month.py
              
            - name: Commit changes 
              uses: EndBug/add-and-commit@v9
              with:
                  remove: ${{ env.FILE_NAME }}
                  add: ${{ env.FILE_NAME }}
                  committer_name: 'GitHub Actions'
                  message: 'updated at ${{ env.NOW }}'

