name: 3 Month Report Flow

on:
  schedule:
    - cron: '0 */4 * * *' #https://crontab.guru/
  workflow_dispatch:

env:
    FILE_NAME: "./Schedule/Aggregated_Hours.xlsx"

jobs:
    pipeline:
        runs-on: ubuntu-latest
              
        steps:
        
            - name: Checkout repo
              uses: actions/checkout@v6 # Allows the GitHub runner access to the repo content
                  
            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                python-version: "3.11.0"

            - name: Setup dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r Schedule/requirements.txt
